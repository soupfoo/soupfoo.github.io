<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="https://github.com/soupfoo.png" />
    <title>%SystemRoot%</title>
  </head>

  <body>
    <div class="container">
      <aside class="fetch" aria-label="profile">
        <div class="window-title">
          <div class="win-buttons">
            <span class="win-btn">🔴</span>
            <span class="win-btn">🟡</span>
            <span class="win-btn">🟢</span>
          </div>
          <div class="win-label">Info</div>
        </div>
        <div class="window-body">
          <img class="pic" src="https://github.com/soupfoo.png" alt="avatar" />
          <br />
          <div class="meta">
            <div class="usr">username - soup</div>
            <div class="langs">langs - C, Py, Go</div>
          </div>
          <br />
          <div class="likes">
            <strong>things I like:</strong>
            <ul>
              <li>dumplings</li>
              <li>rain</li>
              <li>cats</li>
            </ul>
          </div>
        </div>
      </aside>

      <main class="content" id="home">
        <div class="window-title">
          <div class="win-buttons">
            <span class="win-btn">🔴</span>
            <span class="win-btn">🟡</span>
            <span class="win-btn">🟢</span>
          </div>
          <div class="win-label">Repositories</div>
        </div>
        <div class="window-body">
          <div id="repo-list"></div>
        </div>
      </main>

      <div class="terminal">
        <div class="window-title">
          <div class="win-buttons">
            <span class="win-btn">🔴</span>
            <span class="win-btn">🟡</span>
            <span class="win-btn">🟢</span>
          </div>
          <div class="win-label">Terminal</div>
        </div>
        <div class="window-body">
          <pre class="terminal-output">-> echo $TERM</pre>
          <pre class="terminal-output">xterm-webtty</pre>
          <pre class="terminal-output">-> ls -a </pre>
          <pre
            class="terminal-output"
          >.<br>..<br>index.html<br>JetBrainsMono-Medium.ttf<br>LICENSE<br>README.md<br>styles.css</pre>
        </div>
      </div>
    </div>
  </body>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const username = "soupfoo";
      const Repos = [
        { name: "nucore", language: "Go", description: "*nix coreutils" },
        {
          name: "soupfet",
          language: "Go",
          description: "A system info fetch tool for Linux",
        },
        { name: "godc", language: "Go", description: "A postfix calculator" },
        {
          name: "yuki",
          language: "Go",
          description: "A bytecode compiled imperative programming language",
        },
      ];

      const repoList = document.getElementById("repo-list");
      repoList.innerHTML = "";

      for (const r of Repos) {
        const repoName = r.name;
        const lang = r.language;
        const desc = r.description;
        const url = `https://github.com/${username}/${repoName}`;

        const el = document.createElement("a");
        el.className = "repo-link";
        el.href = url;
        el.target = "_blank";
        el.rel = "noopener noreferrer";

        el.innerHTML = `
                    <div class="rheader">
                        <span class="rname">${repoName}</span>
                        <div class="rstats">${lang}</div>
                    </div>
                    <div class="rmeta">${desc}</div>
                `;

        repoList.appendChild(el);
      }
    });
  </script>
</html>
